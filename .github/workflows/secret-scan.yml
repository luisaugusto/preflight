name: Secret scan

# Secret scanning is a required, blocking gate. It runs on every pull request
# and on every push to main; a finding fails the job, and as a required status
# check that failure blocks the merge.
#
# Kept separate from ci.yml because it needs the full commit history
# (fetch-depth: 0) rather than the shallow checkout the quality gate uses, and
# because a red "secret found" status should read clearly on its own.
on:
  pull_request:
  push:
    branches: [main]

# Only the newest commit on a ref needs to gate; cancel superseded runs.
concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # gitleaks scans commit history, so fetch all of it, not a shallow
          # clone. On pull_request the action scans the PR's new commits.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Extend the default ruleset with this repo's EXPO_PUBLIC_* token rules.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # gitleaks-action is free for personal accounts and public repos; a
          # GITLEAKS_LICENSE is only required for GitHub Organization accounts.

  expo-public-guard:
    name: EXPO_PUBLIC_ token guard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # Fast, dependency-free second layer aimed squarely at the documented
      # footgun: a token assigned to an EXPO_PUBLIC_* variable (which Expo inlines
      # into the shipped client bundle). --selftest first proves the rules still
      # fire, then the real scan runs over the tracked tree.
      - name: Self-test the guard rules
        run: ./scripts/ci/check-expo-public-secrets.sh --selftest

      - name: Scan for tokens assigned to EXPO_PUBLIC_ variables
        run: ./scripts/ci/check-expo-public-secrets.sh
