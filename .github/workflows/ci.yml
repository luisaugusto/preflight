name: CI

# With no analytics or crash reporting in the MVP, this workflow is the only
# automated regression safety net. It runs the repo's quality checks on
# every pull request and on every push to main; any failure is a red, blocking
# status.
on:
  pull_request:
  push:
    branches: [main]
  # Exposed as a reusable workflow so other pipelines can gate on this exact
  # quality gate instead of duplicating its steps (and drifting from them). The
  # tagged-release workflow calls it: tag pushes don't match the triggers above,
  # so calling it is the only way a release runs the identical gate on the
  # tagged commit before any build or App Store submission.
  workflow_call:

# Only the newest commit on a ref needs to gate; cancel superseded runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Node 22 resolves to the latest 22.x, matching the repo's documented
      # 22.13+ requirement. `cache: npm` restores ~/.npm keyed on the lockfile.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # content:validate shells out to the dependency-free Python validator.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Clean, reproducible install from the lockfile (not `npm install`).
      - name: Install dependencies
        run: npm ci

      # Each check is a separate step so a red status names the failing gate.
      - name: Typecheck
        run: npm run typecheck

      # ESLint runs Expo's flat config (TypeScript + React Hooks rules) and fails
      # on any warning, so exhaustive-deps and unused-code issues block the merge
      # instead of piling up. `--max-warnings=0` lives in the npm script.
      - name: Lint
        run: npm run lint

      # Prettier is the single source of truth for formatting; `--check` reports
      # drift and never rewrites files in CI.
      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Validate content bundle
        run: npm run content:validate

      # Pin the version: a bare `npx expo-doctor` resolves the latest published
      # release on every run, so an upstream release could turn this required
      # gate red on an unchanged commit despite the locked `npm ci`. 1.20.0 is
      # the current release for SDK 57 (npm dist-tags: latest/next).
      - name: Expo Doctor
        run: npx expo-doctor@1.20.0
